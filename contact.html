<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chambres d'hôtes des Bruyères</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
    <div id="header"></div>

    <main id="mainContact">
        <div class="main-contentContact">

            <div id="ContactInfoContainer">
                <img src="elements/Logo_ChambresDHotesLesBruyeres.svg" alt="Chambres d'hôtes des Bruyères" class="main-logoContact">
                <div id="ContactInfo">
                    <p>13 rue des Bruyères<br>
                    89100, COLLEMIERS</p>
                    <p>03 86 86 63 31 / 06 51 37 31 08</p>
                    <p><a class="contact-a" href="mailto:flo.desa@free.fr">flo.desa@free.fr</a></p>
                </div>
            </div>

            <div id="mapContainer">
                <div id="map"></div>
            </div>
            
        </div>

        <button class="button" onclick="window.location.href='mailto:flo.desa@free.fr'">Réservez maintenant</button>
    </main>

    <div id="footer"></div>

    <script>
        //Map
        const map = L.map('map').setView([48.15690172826381, 3.229428210650782], 12); // Coordonates
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/">OpenStreetMap</a> contributors'
        }).addTo(map);

        // Marker
        L.marker([48.15690172826381, 3.229428210650782]).addTo(map)
            .bindPopup('Chambres d’Hôtes des Bruyères')
            .openPopup();

        //Header and Footer
        fetch("header.html")
            .then(res => res.text())
            .then(data => document.getElementById("header").innerHTML = data);

        fetch("footer.html")
            .then(res => res.text())
            .then(data => document.getElementById("footer").innerHTML = data);
    </script>
</body>
</html>
